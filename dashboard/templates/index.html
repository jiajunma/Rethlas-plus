<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Rethlas Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <!-- MathJax v3 — chosen over KaTeX for Rethlas because agents emit
       unconstrained LaTeX (custom \def, \begin{align}, \overset, etc.)
       and MathJax has wider package coverage + better dynamic-typeset
       story (M12.D will call ``MathJax.typesetPromise([root])`` on
       SSE-patched subtrees rather than re-running renderMathInElement
       across the whole detail panel). CDN now; will be vendored under
       ``dashboard/templates/static/`` in M13.C alongside Cytoscape so
       the supervise process works air-gapped. -->
  <script>
    window.MathJax = {
      tex: {
        inlineMath:  [["$", "$"], ["\\(", "\\)"]],
        displayMath: [["$$", "$$"], ["\\[", "\\]"]],
        processEscapes: true,
        processEnvironments: true,
      },
      options: {
        // Skip MathJax inside <code>/<pre>/<script>/<noscript> so the
        // dashboard's JSON / log displays don't get accidentally
        // typeset.
        skipHtmlTags: ["script", "noscript", "style", "textarea", "code", "pre"],
      },
      startup: {
        // Don't auto-typeset on page load — we explicitly call
        // ``renderMath(root)`` after each detail-panel mount so
        // SSE-driven updates stay local to one subtree.
        typeset: false,
      },
    };
  </script>
  <!-- TODO(M13.C): vendor MathJax under static/ and add SRI hash. -->
  <script defer
          src="https://cdn.jsdelivr.net/npm/mathjax@3.2.2/es5/tex-chtml.js"
          crossorigin="anonymous"></script>
  <style>
    :root {
      color-scheme: light dark;
      --fg: #0f172a;
      --bg: #ffffff;
      --muted: #64748b;
      --line: #e2e8f0;
      --accent: #2563eb;
      --ok: #16a34a;
      --warn: #d97706;
      --bad: #dc2626;
      --code-bg: #f8fafc;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --fg: #e2e8f0;
        --bg: #0b1120;
        --muted: #94a3b8;
        --line: #1e293b;
        --accent: #60a5fa;
        --ok: #4ade80;
        --warn: #fbbf24;
        --bad: #f87171;
        --code-bg: #111827;
      }
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI",
            "Helvetica Neue", Arial, sans-serif;
      color: var(--fg);
      background: var(--bg);
    }
    header {
      padding: 1rem 1.5rem;
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: baseline;
      gap: 1rem;
      flex-wrap: wrap;
    }
    h1 { margin: 0; font-size: 1.05rem; letter-spacing: .04em; }
    main { padding: 1rem 1.5rem; display: grid; gap: 1.25rem; }
    section {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 1rem 1.25rem;
      background: var(--bg);
    }
    section > h2 {
      margin: 0 0 .75rem 0;
      font-size: .82rem;
      font-weight: 600;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .pill {
      display: inline-block;
      padding: .12rem .55rem;
      border-radius: 999px;
      font-size: .72rem;
      font-weight: 600;
      letter-spacing: .04em;
      text-transform: uppercase;
    }
    .pill.healthy { background: rgba(22,163,74,0.12); color: var(--ok); }
    .pill.degraded { background: rgba(217,119,6,0.12); color: var(--warn); }
    .pill.down { background: rgba(220,38,38,0.12); color: var(--bad); }
    table { width: 100%; border-collapse: collapse; font-size: .92rem; }
    th, td {
      text-align: left;
      padding: .35rem .5rem;
      border-bottom: 1px solid var(--line);
      vertical-align: top;
    }
    th { font-weight: 600; color: var(--muted); font-size: .78rem;
         letter-spacing: .04em; text-transform: uppercase; }
    code { background: var(--code-bg); padding: 0 .25rem; border-radius: 3px; }
    .grid { display: grid; gap: .75rem; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); }
    .stat { padding: .5rem .75rem; border: 1px solid var(--line); border-radius: 6px; }
    .stat .label { font-size: .72rem; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; }
    .stat .value { font-size: 1.25rem; font-weight: 600; }
    .empty { color: var(--muted); font-style: italic; }
    .footnote { color: var(--muted); font-size: .8rem; }
    a { color: var(--accent); }
    .math-body {
      white-space: pre-wrap;
      background: var(--code-bg);
      padding: .5rem .75rem;
      border-radius: 6px;
      margin: 0;
      font-size: .9rem;
      line-height: 1.55;
      overflow-x: auto;
    }
    .math-body mjx-container[display="true"] { margin: .5rem 0; }
    .verdict-pill {
      display: inline-block;
      padding: .1rem .55rem;
      border-radius: 999px;
      font-size: .75rem;
      font-weight: 600;
      letter-spacing: .02em;
      text-transform: uppercase;
      vertical-align: middle;
    }
    .verdict-accepted        { background: #16a34a; color: #fff; }
    .verdict-verified_in_nodes,
    .verdict-verified_external_theorem_node { background: #22c55e; color: #052e16; }
    .verdict-gap             { background: #fde68a; color: #713f12; }
    .verdict-missing_from_nodes,
    .verdict-insufficient_information { background: #fbbf24; color: #422006; }
    .verdict-critical        { background: #dc2626; color: #fff; }
    .verdict-not_applicable  { background: #cbd5e1; color: #334155; }
    .verdict-unknown,
    .verdict-—               { background: #cbd5e1; color: #334155; }
    .verifier-card {
      border-left: 3px solid var(--line);
      padding: .25rem .75rem;
      margin: .25rem 0;
    }
    .verifier-row {
      display: flex;
      gap: .6rem;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: .25rem;
    }
    .verifier-counts {
      font-size: .8rem;
      color: var(--muted);
    }
    .repair-hint {
      border-left: 3px solid var(--warn);
    }
    details.verification-report {
      margin: .5rem 0;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: .5rem .75rem;
      background: var(--code-bg);
    }
    details.verification-report > summary {
      cursor: pointer;
      font-weight: 600;
      list-style: none;
    }
    details.verification-report[open] > summary { margin-bottom: .5rem; }
    details.verification-report > summary::before {
      content: "▶ ";
      display: inline-block;
      transition: transform .15s;
    }
    details.verification-report[open] > summary::before {
      content: "▼ ";
    }
    .report-list {
      list-style: none;
      padding-left: 0;
      margin: .25rem 0;
    }
    .report-item {
      margin: .5rem 0;
      padding: .5rem;
      background: var(--bg);
      border-left: 2px solid var(--line);
      border-radius: 4px;
    }
    .report-item-head {
      display: flex;
      gap: .5rem;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: .25rem;
    }
  </style>
</head>
<body>
<header>
  <h1>Rethlas dashboard</h1>
  <span id="updated_at" class="footnote"></span>
</header>
<main>
  <section>
    <h2>Coordinator &amp; Librarian</h2>
    <div class="grid" id="health"></div>
  </section>
  <section>
    <h2>Knowledge base</h2>
    <div class="grid" id="kb"></div>
  </section>
  <section>
    <h2>Active jobs</h2>
    <div id="active"></div>
  </section>
  <section>
    <h2>Human attention</h2>
    <div id="attention"></div>
  </section>
  <section>
    <h2>Theorems</h2>
    <div id="theorems"></div>
  </section>
  <section>
    <h2>All nodes</h2>
    <div class="footnote">Every kind in KB — definitions, propositions, lemmas, theorems, external_theorem.</div>
    <div id="nodes"></div>
  </section>
  <section>
    <h2>Recent rejections / failures</h2>
    <div id="rejected"></div>
  </section>
  <section>
    <h2>Recent truth events</h2>
    <div id="events"></div>
  </section>
  <section id="node_detail_section" hidden>
    <h2>Node detail <span id="node_detail_label" class="footnote"></span>
        <a href="#" id="node_detail_close" class="footnote">close</a></h2>
    <div id="node_detail"></div>
  </section>
</main>
<script>
async function fetchJson(path) {
  try {
    const r = await fetch(path, { cache: "no-store" });
    if (!r.ok) return { __error: r.status };
    return await r.json();
  } catch (e) {
    return { __error: e.message };
  }
}
function pill(label) {
  return `<span class="pill ${label}">${label}</span>`;
}
function stat(label, value) {
  return `<div class="stat"><div class="label">${label}</div>
                 <div class="value">${value}</div></div>`;
}
function rowsToTable(headers, rows) {
  if (!rows.length) return `<div class="empty">none</div>`;
  const head = headers.map(h => `<th>${h}</th>`).join("");
  const body = rows.map(r => `<tr>${
    headers.map(h => `<td>${r[h] ?? ""}</td>`).join("")
  }</tr>`).join("");
  return `<table><thead><tr>${head}</tr></thead><tbody>${body}</tbody></table>`;
}
function shortHash(h) {
  if (!h || typeof h !== "string") return "—";
  return h.length > 14 ? h.slice(0, 14) + "…" : h;
}
function ellipsize(s, n) {
  if (!s) return "";
  s = String(s).replace(/\s+/g, " ");
  return s.length > n ? s.slice(0, n) + "…" : s;
}
function escapeHtml(s) {
  return String(s ?? "")
    .replace(/&/g, "&amp;").replace(/</g, "&lt;")
    .replace(/>/g, "&gt;").replace(/"/g, "&quot;");
}
async function showNode(label) {
  const sec = document.getElementById("node_detail_section");
  const lbl = document.getElementById("node_detail_label");
  const body = document.getElementById("node_detail");
  sec.hidden = false;
  lbl.textContent = label;
  body.innerHTML = `<div class="empty">loading…</div>`;
  const node = await fetchJson("/api/node/" + encodeURIComponent(label));
  if (node.__error) {
    body.innerHTML = `<div class="empty">load error: ${node.__error}</div>`;
    return;
  }
  body.innerHTML = `
    <div class="grid">
      ${stat("kind", node.kind ?? "—")}
      ${stat("pass_count", node.pass_count ?? "—")}
      ${stat("repair_count", node.repair_count ?? "—")}
      ${stat("statement_hash", `<code>${shortHash(node.statement_hash)}</code>`)}
      ${stat("verification_hash", `<code>${shortHash(node.verification_hash)}</code>`)}
      ${stat("status", node.status ?? "—")}
    </div>
    <h3 class="footnote" style="margin:.75rem 0 .25rem 0;">Statement</h3>
    <div class="math-body">${escapeHtml(node.statement ?? "")}</div>
    ${node.proof ? `
      <h3 class="footnote" style="margin:.75rem 0 .25rem 0;">Proof</h3>
      <div class="math-body">${escapeHtml(node.proof)}</div>` : ``}
    ${renderVerifierSection(node)}
    ${renderRepairHint(node)}
    ${renderVerificationReport(node)}
    ${node.deps && node.deps.length ? `
      <h3 class="footnote" style="margin:.75rem 0 .25rem 0;">Dependencies</h3>
      <div>${node.deps.map(d => `<a href="#" data-node="${escapeHtml(d)}">${escapeHtml(d)}</a>`).join(", ")}</div>` : ``}
  `;
  renderMath(body);
  sec.scrollIntoView({ behavior: "smooth", block: "start" });
}

function verdictPill(verdict) {
  const cls = `verdict-pill verdict-${escapeHtml(verdict || "unknown")}`;
  const label = verdict || "unknown";
  return `<span class="${cls}">${escapeHtml(label)}</span>`;
}

function renderVerifierSection(node) {
  const lve = node.latest_verifier_event;
  if (!lve) {
    return `
      <h3 class="footnote" style="margin:.75rem 0 .25rem 0;">Verifier</h3>
      <div class="empty">no verifier verdict on this node yet</div>`;
  }
  const s = lve.summary || {};
  const verdict = s.verdict || "—";
  const counts = [];
  if (typeof s.gap_count === "number") counts.push(`${s.gap_count} gap${s.gap_count===1?"":"s"}`);
  if (typeof s.critical_count === "number") counts.push(`${s.critical_count} critical`);
  if (typeof s.ext_ref_issue_count === "number" && s.ext_ref_issue_count > 0) {
    counts.push(`${s.ext_ref_issue_count} unresolved ref${s.ext_ref_issue_count===1?"":"s"}`);
  }
  return `
    <h3 class="footnote" style="margin:.75rem 0 .25rem 0;">Verifier</h3>
    <div class="verifier-card">
      <div class="verifier-row">
        ${verdictPill(verdict)}
        <span class="footnote">${escapeHtml(lve.ts || "")} · ${escapeHtml(lve.actor || "")}</span>
        ${counts.length ? `<span class="verifier-counts">${escapeHtml(counts.join(" · "))}</span>` : ``}
      </div>
      ${s.report_summary ? `<div class="math-body">${escapeHtml(s.report_summary)}</div>` : ``}
    </div>`;
}

function renderRepairHint(node) {
  const hint = (node.repair_hint || "").trim();
  if (!hint) return ``;
  return `
    <h3 class="footnote" style="margin:.75rem 0 .25rem 0;">Repair hint</h3>
    <div class="math-body repair-hint">${escapeHtml(hint)}</div>`;
}

function renderVerificationReport(node) {
  const r = node.verification_report_parsed;
  if (!r) return ``;
  const items = (r.checked_items || []).map(it => `
    <li class="report-item">
      <div class="report-item-head">
        ${verdictPill(it.status || "—")}
        <span class="footnote">${escapeHtml(it.location || "")}</span>
      </div>
      <div class="math-body">${escapeHtml(it.notes || "")}</div>
    </li>`).join("");
  const refs = (r.external_reference_checks || []).map(it => `
    <li class="report-item">
      <div class="report-item-head">
        ${verdictPill(it.status || "—")}
        <code>${escapeHtml(it.reference || "")}</code>
        <span class="footnote">${escapeHtml(it.location || "")}</span>
      </div>
      <div class="math-body">${escapeHtml(it.notes || "")}</div>
    </li>`).join("");
  const gaps = (r.gaps || []).map(it => `
    <li class="report-item">
      <div class="footnote">${escapeHtml(it.location || "")}</div>
      <div class="math-body">${escapeHtml(it.issue || "")}</div>
    </li>`).join("");
  const crits = (r.critical_errors || []).map(it => `
    <li class="report-item">
      <div class="footnote">${escapeHtml(it.location || "")}</div>
      <div class="math-body">${escapeHtml(it.issue || it.notes || "")}</div>
    </li>`).join("");
  return `
    <details class="verification-report">
      <summary>Full verification report (${(r.checked_items||[]).length} items, ${(r.gaps||[]).length} gaps, ${(r.critical_errors||[]).length} critical, ${(r.external_reference_checks||[]).length} refs)</summary>
      ${r.summary ? `<div class="math-body">${escapeHtml(r.summary)}</div>` : ``}
      ${items ? `<h4 class="footnote">Checked items</h4><ul class="report-list">${items}</ul>` : ``}
      ${gaps ? `<h4 class="footnote">Gaps</h4><ul class="report-list">${gaps}</ul>` : ``}
      ${crits ? `<h4 class="footnote">Critical errors</h4><ul class="report-list">${crits}</ul>` : ``}
      ${refs ? `<h4 class="footnote">External reference checks</h4><ul class="report-list">${refs}</ul>` : ``}
    </details>`;
}

function renderMath(root) {
  // MathJax v3: typeset only the subtree we just patched, never the
  // whole document. Best-effort — if MathJax hasn't loaded yet (defer
  // + slow CDN) the call is a no-op; the next detail-panel mount will
  // pick it up. M12.D's SSE-patch path will reuse this helper so each
  // verdict-driven badge update only re-typesets the one node card.
  if (!window.MathJax || !window.MathJax.typesetPromise) return;
  try {
    window.MathJax.typesetPromise([root]).catch(() => {});
  } catch (e) { /* swallow — render best-effort */ }
}
document.addEventListener("click", (e) => {
  const a = e.target.closest("[data-node]");
  if (a) {
    e.preventDefault();
    showNode(a.dataset.node);
  }
  if (e.target.id === "node_detail_close") {
    e.preventDefault();
    document.getElementById("node_detail_section").hidden = true;
  }
});

async function refresh() {
  const overview = await fetchJson("/api/overview");
  const active = await fetchJson("/api/active");
  const attention = await fetchJson("/api/attention");
  const theorems = await fetchJson("/api/theorems");
  const nodes = await fetchJson("/api/nodes");
  const rejected = await fetchJson("/api/rejected");
  const events = await fetchJson("/api/events?limit=30");
  const updated = document.getElementById("updated_at");
  updated.textContent = "refreshed " + new Date().toLocaleTimeString();

  const dashboardHb = await fetchJson("/api/dashboard");
  const health = document.getElementById("health");
  if (overview.coordinator) {
    health.innerHTML = [
      stat("coordinator", pill(overview.coordinator.liveness ?? "down")),
      stat("librarian", pill(overview.librarian.liveness ?? "down")),
      stat("dashboard", pill(dashboardHb.liveness ?? "down")),
      stat("loop_seq", overview.coordinator.data?.loop_seq ?? 0),
      stat("idle_reason", overview.coordinator.data?.idle_reason_code || "—"),
    ].join("");
  }
  const kb = document.getElementById("kb");
  if (overview.kb) {
    const kinds = overview.kb.kind_counts || {};
    const orderedKinds = ["theorem", "proposition", "lemma", "definition", "external_theorem"];
    const kindStats = orderedKinds
      .filter(k => (kinds[k] || 0) > 0)
      .map(k => stat(k, kinds[k]));
    kb.innerHTML = [
      stat("nodes", overview.kb.node_count),
      ...kindStats,
      stat("done", overview.kb.done_count),
      stat("unfinished", overview.kb.unfinished_count),
      stat("in-flight targets", overview.in_flight_target_count ?? 0),
    ].join("");
  }
  document.getElementById("active").innerHTML = rowsToTable(
    ["job_id", "kind", "target", "mode", "status", "started_at"],
    (active.jobs ?? []).map(j => ({
      job_id: `<code>${j.job_id}</code>`, kind: j.kind, target: j.target,
      mode: j.mode, status: j.status, started_at: j.started_at,
    }))
  );
  document.getElementById("attention").innerHTML = rowsToTable(
    ["kind", "message"],
    (attention.items ?? []).map(i => ({ kind: i.kind, message: i.message }))
  );
  document.getElementById("theorems").innerHTML = rowsToTable(
    ["label", "status", "pass_count", "repair_count", "deps"],
    (theorems.theorems ?? []).map(t => ({
      label: `<a href="#" data-node="${escapeHtml(t.label)}">${escapeHtml(t.label)}</a>`,
      status: t.status, pass_count: t.pass_count, repair_count: t.repair_count,
      deps: (t.deps || []).map(d => `<a href="#" data-node="${escapeHtml(d)}">${escapeHtml(d)}</a>`).join(", "),
    }))
  );
  document.getElementById("nodes").innerHTML = rowsToTable(
    ["kind", "label", "status", "pass_count", "repair_count", "deps"],
    (nodes.nodes ?? []).map(n => ({
      kind: n.kind,
      label: `<a href="#" data-node="${escapeHtml(n.label)}">${escapeHtml(n.label)}</a>`,
      status: n.status, pass_count: n.pass_count, repair_count: n.repair_count,
      deps: (n.deps || []).map(d => `<a href="#" data-node="${escapeHtml(d)}">${escapeHtml(d)}</a>`).join(", "),
    }))
  );
  // Recent rejections / apply failures / drift alerts (most recent first).
  const allRej = []
    .concat((rejected.rejected_writes ?? []).map(r => ({
      ts: r.ts, kind: "rejected_write", actor: r.actor,
      target: r.target, reason: r.reason,
      detail: ellipsize(r.detail, 200),
    })))
    .concat((rejected.apply_failed ?? []).map(r => ({
      ts: r.ts, kind: "apply_failed", actor: r.actor ?? "librarian",
      target: r.target, reason: r.reason,
      detail: ellipsize(r.detail, 200),
    })))
    .concat((rejected.drift_alerts ?? []).map(r => ({
      ts: r.ts, kind: "drift_alert", actor: r.actor,
      target: r.target, reason: r.reason,
      detail: ellipsize(r.detail, 200),
    })))
    .sort((a, b) => (b.ts || "").localeCompare(a.ts || ""));
  document.getElementById("rejected").innerHTML = rowsToTable(
    ["ts", "kind", "target", "reason", "detail"],
    allRej.map(r => ({
      ts: `<code>${escapeHtml(r.ts || "")}</code>`,
      kind: escapeHtml(r.kind),
      target: r.target ? `<a href="#" data-node="${escapeHtml(r.target)}">${escapeHtml(r.target)}</a>` : "—",
      reason: `<code>${escapeHtml(r.reason || "")}</code>`,
      detail: `<code style="white-space:pre-wrap;">${escapeHtml(r.detail || "")}</code>`,
    }))
  );
  // Recent truth events (most recent first per /api/events default).
  document.getElementById("events").innerHTML = rowsToTable(
    ["ts", "type", "target", "actor", "event_id"],
    (events.events ?? []).map(e => {
      const ts = (e.event_id || "").split("-")[0] || "";
      return {
        ts: `<code>${escapeHtml(ts)}</code>`,
        type: `<code>${escapeHtml(e.type || "")}</code>`,
        target: e.target ? `<a href="#" data-node="${escapeHtml(e.target)}">${escapeHtml(e.target)}</a>` : "—",
        actor: escapeHtml(e.actor || ""),
        event_id: `<code>${escapeHtml((e.event_id || "").slice(-16))}</code>`,
      };
    })
  );
}
refresh();
setInterval(refresh, 5000);
</script>
</body>
</html>
